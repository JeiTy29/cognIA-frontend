name: Frontend Deploy (Self-Hosted, Non-Required)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-deploy-main-self-hosted
  cancel-in-progress: false

jobs:
  frontend_deploy_self_hosted:
    name: frontend-deploy-self-hosted
    runs-on: [self-hosted, linux, x64, cognia-frontend]
    timeout-minutes: 60
    env:
      DEPLOY_BRANCH: main
      FRONTEND_REPO_DIR: /opt/cognia/frontend
      COMPOSE_DIR: /opt/cognia
      FRONTEND_SERVICE: frontend
      GATEWAY_SERVICE: gateway
      HEALTHCHECK_URL: http://localhost
      HEALTHCHECK_RETRIES: "30"
      HEALTHCHECK_INTERVAL_SECONDS: "5"

    steps:
      - name: Checkout workflow repository
        uses: actions/checkout@v4

      - name: Run self-hosted deploy orchestration
        shell: bash
        env:
          EXPECTED_COMMIT: ${{ github.sha }}
        run: |
          bash ./scripts/ops/deploy_frontend_self_hosted.sh
