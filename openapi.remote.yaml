  /api/admin/audit-logs:
    get:
      tags:
      - Admin
      summary: "Consultar el historial de auditor\xEDa operativa del sistema"
      description: '**Objetivo funcional**

        Este endpoint permite consultar el recurso de `admin`.


        **Cuando debe usarse**

        Usalo cuando el flujo requiera invocar `GET /api/admin/audit-logs` y mantener trazabilidad contractual.


        **Actor que lo consume**

        Administrador de plataforma o equipo de backoffice.


        **Seguridad aplicable**

        - Requiere esquema(s) de seguridad: bearerAuth. Roles requeridos: ADMIN.


        **Entrada esperada**

        - Metodo y ruta: `GET /api/admin/audit-logs`.

        - Parametros de ruta: no aplica.

        - Query params: user_id (opcional), action (opcional), section (opcional), from_date (opcional), to_date (opcional),
        sort (opcional).

        - Headers adicionales: no aplica.

        - Body: no aplica.


        **Resultado exitoso**

        - Codigos de exito documentados: 200.

        - La respuesta representa el estado procesado por el backend y mantiene compatibilidad con el esquema documentado.


        **Errores posibles y causa funcional**

        - `400`: Solicitud invalida por formato, validacion o reglas de negocio.

        - `401`: No autenticado o token invalido/expirado.

        - `403`: Autenticado sin permisos suficientes para esta operacion.

        - `429`: Limite de tasa excedido; reintentar segun politicas de rate limit.

        - `500`: Error interno del servidor sin exposicion de detalles sensibles.


        **Estado contractual**

        - `KEEP_ACTIVE`

        - Motivo: Contrato administrativo vigente para backoffice y operaciones de seguridad.

        - Accion OpenAPI: mantener visible'
