openapi: 3.0.3
info:
  title: CognIA Backend API
  version: 2026-03-29-openapi-final
  description: 'API backend de CognIA para soporte de screening y alerta temprana en salud mental infantil (6 a 11 anos) en
    entorno academico simulado.


    Alcance funcional:

    - Auth JWT + MFA, usuarios/admin, cuestionarios v1/runtime v1/v2, dashboards, reportes y problem reports.

    - Contratos legacy documentados con estado contractual explicito.


    Caveat clinico:

    - La API genera alertas de riesgo para screening/apoyo profesional.

    - No es diagnostico clinico automatico ni definitivo.


    Seguridad:

    - JWT/cookies segun endpoint, CSRF en refresh y rate limits por endpoint critico.

    - Endpoints admin restringidos por rol ADMIN.

    - Errores endurecidos sin fuga de detalles sensibles.'
servers:
- url: /
  description: Same-origin (use the host that serves /docs)
- url: http://127.0.0.1:5000
  description: Local development (IPv4)
- url: http://localhost:5000
  description: Local development (hostname)
tags:
- name: Health
  description: "Salud del proceso, readiness, documentaci\xF3n servida y m\xE9tricas t\xE9cnicas de proceso."
- name: Auth
  description: "Registro, login, refresh, logout, perfil y recuperaci\xF3n de contrase\xF1a."
- name: MFA
  description: "Enrolamiento, confirmaci\xF3n y desactivaci\xF3n de autenticaci\xF3n multifactor TOTP."
- name: Email
  description: "Flujos de desuscripci\xF3n y estado de correo."
- name: Admin
  description: "Gobierno administrativo del backend: usuarios, psic\xF3logos, auditor\xEDa, m\xE9tricas y correo."
- name: Users
  description: "Contrato legacy v1 para gesti\xF3n de usuarios."
- name: Questionnaires
  description: "Contrato cl\xE1sico v1 de plantillas y preguntas."
- name: Evaluations
  description: "Contrato cl\xE1sico v1 de evaluaciones."
- name: Predict
  description: Endpoint experimental o legado de inferencia directa.
- name: QuestionnaireRuntime
  description: Flujo runtime v1 de borradores, submit, resultados y acceso profesional.
- name: QuestionnaireRuntimeAdmin
  description: Gobierno administrativo del runtime v1.
- name: QuestionnaireV2
  description: "Flujo activo de sesiones, historial, resultados, PDF, tags y compartici\xF3n."
- name: Dashboard
  description: Agregados operativos de dashboards.
- name: Reports
  description: "Creaci\xF3n de trabajos de reporte a partir de dashboards."
- name: ProblemReports
  description: Registro y seguimiento de reportes de problema.
- name: Docs
  description: "Recursos del propio Swagger/OpenAPI servidos por la aplicaci\xF3n."
- name: Misc
  description: Endpoints no clasificados explicitamente.
paths:
  /api/admin/users/{id}:
    patch:
      tags:
      - Admin
      summary: Actualizar atributos administrativos de un usuario existente
      description: |
        **Objetivo funcional**
        Actualizar atributos administrativos de un usuario existente.

        **Cuando debe usarse**
        Debe invocarse cuando el cliente necesita exactamente este paso del flujo publicado por la API en la ruta `PATCH /api/admin/users/{id}`.

        **Actor que lo consume**
        Lo consume típicamente backoffice o frontend administrativo con rol ADMIN.

        **Seguridad aplicable**
        Requiere: JWT bearer.

        **Entrada esperada**
        Request body obligatorio. Formatos admitidos: application/json. Schema principal: AdminUserPatchRequest.

        Reglas obligatorias:
        Debe respetar los parámetros declarados en ruta o query: id. El body debe cumplir el schema `AdminUserPatchRequest` y sus restricciones de tipos, obligatoriedad, enums, rangos y formatos. La cuenta autenticada debe tener privilegios administrativos suficientes para operar el recurso.

        **Resultado exitoso**
        Actualiza el recurso solicitado y devuelve confirmación o la representación actualizada del estado.

        **Errores posibles y causa funcional**
        Este endpoint documenta explícitamente los códigos 200, 400, 401, 403, 404, 409, 429, 500. Cada código debe interpretarse con la causa funcional descrita en la sección de respuestas, no como un fallo genérico reutilizable.

        Limitaciones actuales:
        La operación puede dejar trazabilidad administrativa o de auditoría según la implementación de servicios y modelos.

        **Estado contractual**
        `KEEP_ACTIVE`

        Marco de cumplimiento profesional:
        - Punto de control contractual: `PATCH /api/admin/users/{id}`.
        - Seguridad operacional: bearerAuth. Roles declarados: ADMIN.
        - Respuestas contractuales auditadas: 200, 400, 401, 403, 404, 409, 429, 500.
        - Comportamiento condicional: el consumidor debe decidir el flujo exclusivamente por codigo HTTP y por las claves del body devuelto; no por supuestos externos.
        - Trazabilidad recomendada: registrar actor, identificador de recurso, filtros aplicados, timestamp UTC y resultado final de la operacion para auditoria reproducible.
        - Criterio de uso profesional: este contrato es de soporte operativo y screening en entorno simulado; no reemplaza criterio clinico ni constituye diagnostico automatico.
      operationId: updateAdminUser
      x-roles:
      - ADMIN
      security:
      - bearerAuth: []
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUserPatchRequest'
            examples:
              deactivate:
                summary: Deactivate user
                value:
                  is_active: false
              roles:
                summary: Update roles
                value:
                  roles:
                  - ADMIN
                  - ANALYST
      responses:
        '200':
          description: Actualiza el recurso solicitado y devuelve confirmación o la representación actualizada del estado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserItem'
              examples:
                updated:
                  summary: Updated
                  value:
                    id: b28e6f7e-2c88-4a31-9c2f-0f35e33b2c4a
                    username: guardian_01
                    email: guardian@example.com
                    full_name: Maria Perez
                    user_type: guardian
                    professional_card_number:
                    colpsic_verified: false
                    is_active: false
                    roles:
                    - GUARDIAN
                    - ANALYST
                    updated_at: '2026-02-02T11:11:11Z'
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                error_400:
                  value:
                    msg: request validation failed for api_admin_users_id
                    error: invalid_api_admin_users_id
          description: La solicitud no cumple validaciones de formato, campos obligatorios, enums, rangos o reglas de negocio del endpoint.
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                error_401:
                  value:
                    msg: unauthorized
                    error: unauthorized
          description: No existe autenticación válida, el token expiró o la credencial enviada no es aceptada por el backend.
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                error_403:
                  value:
                    msg: access denied for api_admin_users_id
                    error: forbidden_api_admin_users_id
          description: La cuenta está autenticada pero no tiene permiso suficiente, o falló una regla adicional de seguridad, ownership o acceso.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                error_404:
                  value:
                    msg: resource not found for api_admin_users_id
                    error: api_admin_users_id_not_found
          description: El recurso objetivo no existe, no está habilitado en este entorno o no es visible para el actor actual.
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                error_409:
                  value:
                    msg: conflict while processing api_admin_users_id
                    error: api_admin_users_id_conflict
          description: La operación entra en conflicto con el estado actual del recurso o con una restricción de unicidad, transición o concurrencia.
        '429':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                error_429:
                  value:
                    msg: rate limit exceeded for api_admin_users_id
                    error: rate_limited
          description: Se superó el límite de solicitudes permitido por la política de protección del backend.
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                error_500:
                  value:
                    msg: internal failure while processing api_admin_users_id
                    error: server_error
          description: El backend encontró una falla interna durante consulta, persistencia, generación, inferencia o coordinación del flujo.
      x-contract-status: KEEP_ACTIVE
