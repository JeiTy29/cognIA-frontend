components:
  parameters:
    CsrfHeader:
      in: header
      name: X-CSRF-Token
      required: true
      schema:
        type: string
    PageParam:
      in: query
      name: page
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSizeParam:
      in: query
      name: page_size
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    OrderParam:
      in: query
      name: order
      required: false
      schema:
        type: string
        enum:
        - asc
        - desc
        default: desc
    MonthsParam:
      in: query
      name: months
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 120
        default: 12
    UnreadOnlyParam:
      in: query
      name: unread_only
      required: false
      schema:
        type: boolean
        default: false
    RuntimeExportModeParam:
      in: query
      name: mode
      required: false
      schema:
        type: string
        enum:
        - responses_only
        - results_only
        - responses_and_results
        default: responses_and_results
    ModeParamV2:
      in: query
      name: mode
      required: false
      schema:
        type: string
        enum:
        - short
        - medium
        - complete
        default: short
    RoleParamV2:
      in: query
      name: role
      required: false
      schema:
        type: string
        enum:
        - guardian
        - psychologist
        default: guardian
    IncludeFullParam:
      in: query
      name: include_full
      required: false
      schema:
        type: boolean
        default: false
    SessionStatusParam:
      in: query
      name: status
      required: false
      schema:
        type: string
        enum:
        - draft
        - in_progress
        - submitted
        - processed
        - failed
        - archived
    CognIAEncryptedHeader:
      in: header
      name: X-CognIA-Encrypted
      required: false
      description: "Set `1` when request body is sent as encrypted transport envelope. If payload is encrypted, this header is mandatory."
      schema:
        type: string
        enum:
        - '1'
    CognIACryptoVersionHeader:
      in: header
      name: X-CognIA-Crypto-Version
      required: false
      description: "Transport crypto envelope version expected by backend. Mandatory when `X-CognIA-Encrypted: 1`."
      schema:
        type: string
        enum:
        - transport_envelope_v1
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    mfaEnrollmentToken:
      type: http
      scheme: bearer
      bearerFormat: JWT
    cookieAuth:
      type: apiKey
      in: cookie
      name: refresh_token
    csrfCookie:
      type: apiKey
      in: cookie
      name: csrf_refresh_token
    csrfHeader:
      type: apiKey
      in: header
      name: X-CSRF-Token
    metricsToken:
      type: apiKey
      in: header
      name: Authorization
  responses:
    BadRequest:
      description: Request payload is invalid for this operation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid authentication.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Authenticated actor is not allowed to execute this operation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Requested resource is not available for this actor/context.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Request conflicts with current resource state.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    CsrfFailed:
      description: CSRF validation failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    RateLimited:
      description: Too many requests according to active rate-limit policy.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Locked:
      description: Endpoint is temporarily locked for this actor/request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServerError:
      description: Internal server error while processing request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServiceUnavailable:
      description: Service or dependency unavailable.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      required:
      - msg
      - error
      properties:
        msg:
          type: string
          description: Human-readable error message.
        error:
          type: string
          description: Stable error code.
        details:
          type: object
          nullable: true
          additionalProperties: true
          description: Optional structured details (validation fields, limits, etc.).
        errors:
          type: object
          nullable: true
          additionalProperties: true
          deprecated: true
          description: Legacy validation errors shape (predict endpoint).
        trace_id:
          type: string
          nullable: true
          description: Correlation/trace id (if enabled by the platform).
      example:
        msg: Validation error
        error: validation_error
        details:
          email:
          - Invalid email format
        trace_id: f3c7c6f1c1a34c6a
    TransportPublicKeyJwk:
      type: object
      required:
      - kty
      - alg
      - use
      - n
      - e
      properties:
        kty:
          type: string
          enum:
          - RSA
        alg:
          type: string
          enum:
          - RSA-OAEP-256
        use:
          type: string
          enum:
          - enc
        n:
          type: string
          description: Base64url modulus.
        e:
          type: string
          description: Base64url exponent.
    TransportKeyResponse:
      type: object
      required:
      - key_id
      - algorithm
      - public_key_jwk
      - expires_at
      - version
      properties:
        key_id:
          type: string
          example: transport-key-v1
        algorithm:
          type: string
          example: RSA-OAEP-256+AES-256-GCM
        public_key_jwk:
          $ref: '#/components/schemas/TransportPublicKeyJwk'
        expires_at:
          type: string
          format: date-time
        version:
          type: string
          enum:
          - transport_envelope_v1
    TransportEncryptedRequestEnvelope:
      type: object
      required:
      - encrypted
      - version
      - key_id
      - alg
      - encrypted_key
      - iv
      - ciphertext
      properties:
        encrypted:
          type: boolean
          enum:
          - true
        version:
          type: string
          enum:
          - transport_envelope_v1
        key_id:
          type: string
          example: transport-key-v1
        alg:
          type: string
          example: AES-256-GCM
        encrypted_key:
          type: string
          description: Base64url RSA-OAEP encrypted AES key.
        iv:
          type: string
          description: Base64url 96-bit IV.
        ciphertext:
          type: string
          description: Base64url AES-GCM ciphertext+tag.
        aad:
          type: string
          nullable: true
          description: Optional additional authenticated data.
    TransportEncryptedResponseEnvelope:
      type: object
      required:
      - encrypted
      - version
      - key_id
      - alg
      - iv
      - ciphertext
      properties:
        encrypted:
          type: boolean
          enum:
          - true
        version:
          type: string
          enum:
          - transport_envelope_v1
        key_id:
          type: string
          example: transport-key-v1
        alg:
          type: string
          example: AES-256-GCM
        iv:
          type: string
          description: Base64url 96-bit IV.
        ciphertext:
          type: string
          description: Base64url AES-GCM ciphertext+tag.
        aad:
          type: string
          nullable: true
          description: Optional additional authenticated data.
    SessionCreateRequestPlain:
