<svg
  xmlns="http://www.w3.org/2000/svg"
  width="560"
  height="420"
  viewBox="0 0 560 420"
  fill="none"
  role="img"
  aria-label="Ilustración SVG de un cuestionario (clipboard con formulario)"
>
  <defs>
    <!-- Soft shadow -->
    <filter id="shadowSoft" x="-40" y="-40" width="640" height="520" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0B3A68" flood-opacity="0.18"/>
    </filter>

    <!-- Clipboard gradient -->
    <linearGradient id="clipGrad" x1="160" y1="70" x2="420" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1E88E5"/>
      <stop offset="1" stop-color="#90CAF9"/>
    </linearGradient>

    <!-- Paper subtle gradient -->
    <linearGradient id="paperGrad" x1="190" y1="120" x2="390" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F6FAFF"/>
    </linearGradient>

    <!-- Small accent gradient -->
    <linearGradient id="accentBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2D9CDB"/>
      <stop offset="1" stop-color="#56CCF2"/>
    </linearGradient>

    <!-- Clip path for paper rounded corners -->
    <clipPath id="paperClip">
      <rect x="170" y="120" width="220" height="250" rx="18"/>
    </clipPath>
  </defs>

  <!-- Decorative floating blobs (no full background) -->
  <g opacity="0.9">
    <path d="M92 120c22-26 55-22 70 3s2 62-23 78-62 8-74-19 5-45 27-62Z" fill="#E8F2FF"/>
    <path d="M468 92c18-18 49-16 62 7 13 23 1 55-23 64-24 10-54-2-61-24-7-22 4-35 22-47Z" fill="#EAF7F4"/>
    <circle cx="448" cy="332" r="22" fill="#FFF3E6"/>
  </g>

  <!-- Main illustration group -->
  <g filter="url(#shadowSoft)">
    <!-- Clipboard body -->
    <rect x="140" y="70" width="280" height="320" rx="28" fill="url(#clipGrad)"/>
    <!-- Inner rim -->
    <rect x="156" y="86" width="248" height="288" rx="22" fill="#0F5FA8" opacity="0.10"/>

    <!-- Top clip -->
    <g>
      <rect x="222" y="48" width="116" height="70" rx="18" fill="#0B4C8C"/>
      <rect x="236" y="60" width="88" height="46" rx="14" fill="#0E66B8" opacity="0.9"/>
      <!-- Clip highlight -->
      <path d="M248 70c10-10 32-12 48-6" stroke="#9ED3FF" stroke-width="8" stroke-linecap="round" opacity="0.35"/>
    </g>

    <!-- Paper sheet -->
    <rect x="170" y="120" width="220" height="250" rx="18" fill="url(#paperGrad)"/>
    <rect x="170" y="120" width="220" height="250" rx="18" stroke="#D6E8FF" stroke-width="2"/>

    <!-- Paper contents -->
    <g clip-path="url(#paperClip)">
      <!-- Header line -->
      <rect x="192" y="144" width="150" height="12" rx="6" fill="#D6E8FF"/>
      <rect x="192" y="162" width="96" height="10" rx="5" fill="#E6F1FF"/>

      <!-- Section title -->
      <rect x="192" y="186" width="120" height="10" rx="5" fill="#D6E8FF"/>

      <!-- Checkbox items -->
      <g>
        <rect x="192" y="210" width="18" height="18" rx="5" fill="#FFFFFF" stroke="#B7D6FF" stroke-width="2"/>
        <path d="M196 219l4 4 8-10" stroke="#26A69A" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="218" y="214" width="150" height="10" rx="5" fill="#E6F1FF"/>

        <rect x="192" y="238" width="18" height="18" rx="5" fill="#FFFFFF" stroke="#B7D6FF" stroke-width="2"/>
        <rect x="218" y="242" width="126" height="10" rx="5" fill="#E6F1FF"/>

        <rect x="192" y="266" width="18" height="18" rx="5" fill="#FFFFFF" stroke="#B7D6FF" stroke-width="2"/>
        <path d="M196 275l4 4 8-10" stroke="#26A69A" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
        <rect x="218" y="270" width="140" height="10" rx="5" fill="#E6F1FF"/>
      </g>

      <!-- Likert scale / slider -->
      <g>
        <rect x="192" y="302" width="176" height="12" rx="6" fill="#E6F1FF"/>
        <rect x="192" y="302" width="110" height="12" rx="6" fill="url(#accentBlue)"/>
        <circle cx="304" cy="308" r="12" fill="#FFFFFF" stroke="#56CCF2" stroke-width="3"/>
      </g>

      <!-- Text area -->
      <g>
        <rect x="192" y="326" width="176" height="62" rx="12" fill="#FFFFFF" stroke="#D6E8FF" stroke-width="2"/>
        <rect x="204" y="340" width="120" height="9" rx="4.5" fill="#E6F1FF"/>
        <rect x="204" y="356" width="146" height="9" rx="4.5" fill="#E6F1FF"/>
        <rect x="204" y="372" width="96" height="9" rx="4.5" fill="#E6F1FF"/>
      </g>
    </g>

    <!-- Floating status icons (simple, not complex) -->
    <g>
      <!-- Teal check badge -->
      <circle cx="408" cy="188" r="18" fill="#26A69A"/>
      <path d="M400 188l6 6 12-14" stroke="#FFFFFF" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>

      <!-- Orange alert badge -->
      <circle cx="430" cy="226" r="18" fill="#FB8C00"/>
      <path d="M430 214v14" stroke="#FFFFFF" stroke-width="4.5" stroke-linecap="round"/>
      <circle cx="430" cy="236" r="3" fill="#FFFFFF"/>

      <!-- Purple question badge -->
      <circle cx="406" cy="264" r="18" fill="#7E57C2"/>
      <path
        d="M400.5 258.5c1.8-4.4 6.2-7.2 10.9-6.6 4.7.6 8.1 4 8.1 8.2 0 5.8-6.6 6.8-6.6 10.2"
        stroke="#FFFFFF"
        stroke-width="4.2"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"
      />
      <circle cx="413" cy="276.5" r="3" fill="#FFFFFF"/>
    </g>
  </g>

  <!-- Extra small dots -->
  <g opacity="0.6">
    <circle cx="110" cy="270" r="4" fill="#2D9CDB"/>
    <circle cx="92" cy="288" r="3" fill="#26A69A"/>
    <circle cx="470" cy="300" r="4" fill="#FB8C00"/>
    <circle cx="488" cy="284" r="3" fill="#7E57C2"/>
  </g>
</svg>
